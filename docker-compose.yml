services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-n8n_password}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n}"]
      interval: 5s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-n8n_password}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change-this-to-a-random-string}
      WEBHOOK_URL: http://n8n:5678/
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      N8N_WEBHOOK_BASE_URL: http://n8n:5678
      ALEXA_SKILL_ID: ${ALEXA_SKILL_ID:-}
      ALEXA_VERIFY_REQUESTS: ${ALEXA_VERIFY_REQUESTS:-false}
      DEFAULT_AGENT: ${DEFAULT_AGENT:-general-assistant}
      INTENT_AGENT_MAP: ${INTENT_AGENT_MAP:-{}}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-n8n_password}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    depends_on:
      postgres:
        condition: service_healthy
      n8n:
        condition: service_started

volumes:
  postgres_data:
  n8n_data:
